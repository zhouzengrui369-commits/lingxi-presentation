<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灵犀演示 · Desktop Scaffold (Dark · T-1.0.b)</title>
  <style>
    body { background: #0F1115; margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .macos-frame { width: 1100px; height: 720px; background: #0F1115; border-radius: 12px; box-shadow: 0 24px 60px rgba(0,0,0,0.4); overflow: hidden; display: flex; flex-direction: column; }
    .titlebar { height: 28px; background: #171A21; border-bottom: 1px solid #2A2F38; display: flex; align-items: center; padding: 0 12px; gap: 8px; }
    .traffic { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #FF5F57; }
    .dot.y { background: #FFBD2E; }
    .dot.g { background: #28C840; }
    .title { flex: 1; text-align: center; font-size: 12px; color: #B4BAC4; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid #2A2F38; background: #0F1115; }
    .brand { display: flex; flex-direction: column; gap: 2px; }
    .brandTitle { font-size: 18px; font-weight: 700; color: #F1F3F7; }
    .brandSubtitle { font-size: 12px; color: #B4BAC4; }
    .themeSwitch { padding: 8px 14px; border-radius: 8px; border: 1px solid #2A2F38; display: flex; align-items: center; gap: 8px; background: #171A21; color: #F1F3F7; font-weight: 600; font-size: 13px; }
    .themeDot { width: 12px; height: 12px; border-radius: 50%; background: #5A6478; }
    .body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .tabbar { background: #171A21; border-bottom: 1px solid #2A2F38; display: flex; padding: 0 16px; gap: 4px; }
    .tab { padding: 14px 18px; border-bottom: 2px solid transparent; display: flex; flex-direction: column; align-items: flex-start; cursor: pointer; }
    .tab.active { border-bottom-color: #4D8CF2; }
    .tabLabel { font-size: 14px; font-weight: 600; color: #B4BAC4; }
    .tab.active .tabLabel { color: #F1F3F7; }
    .tabTag { font-size: 11px; color: #7B8089; margin-top: 2px; }
    .content { flex: 1; padding: 24px; background: #0F1115; overflow-y: auto; }
    .pageTitle { font-size: 24px; font-weight: 700; color: #F1F3F7; margin-bottom: 4px; }
    .pageSubtitle { font-size: 14px; color: #B4BAC4; margin-bottom: 16px; }
    .card { margin-top: 16px; padding: 20px; border-radius: 12px; border: 1px solid #2A2F38; background: #171A21; }
    .cardText { font-size: 14px; line-height: 22px; color: #7B8089; }
    .empty { margin-top: 24px; padding: 32px; border-radius: 12px; border: 1px dashed #3A4150; text-align: center; }
    .emptyText { font-size: 13px; color: #7B8089; }
    .footer { padding: 8px 16px; border-top: 1px solid #2A2F38; font-size: 11px; display: flex; justify-content: space-between; background: #171A21; color: #7B8089; }
  </style>
</head>
<body>
  <div class="macos-frame">
    <div class="titlebar">
      <div class="traffic"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
      <div class="title">灵犀演示 — LingxiDemo</div>
      <div style="width:50px"></div>
    </div>
    <div class="header">
      <div class="brand">
        <div class="brandTitle">灵犀演示</div>
        <div class="brandSubtitle">AI 驱动的办公内容生成桌面 App · Phase 1</div>
      </div>
      <div class="themeSwitch">
        <div class="themeDot"></div>
        <div>Dark</div>
      </div>
    </div>
    <div class="body">
      <div class="tabbar">
        <div class="tab"><div class="tabLabel">文件管理</div><div class="tabTag">T-1.1</div></div>
        <div class="tab"><div class="tabLabel">顾问交互</div><div class="tabTag">T-1.2</div></div>
        <div class="tab"><div class="tabLabel">模板</div><div class="tabTag">T-1.3</div></div>
        <div class="tab active"><div class="tabLabel">预览</div><div class="tabTag">T-1.4</div></div>
        <div class="tab"><div class="tabLabel">输出</div><div class="tabTag">T-1.5</div></div>
      </div>
      <div class="content">
        <div class="pageTitle">HTML 预览</div>
        <div class="pageSubtitle">T-1.4 等待实现</div>
        <div class="card">
          <div class="cardText">本模块负责：AI 优先出 HTML 预览（不直接成品），轻量改文字/段落直接在预览页改，复杂改动回 AI 重生成；实时保存。</div>
        </div>
        <div class="empty">
          <div class="emptyText">— 该模块由对应 sub-agent 在 worktree 中实现（T-1.4） —</div>
        </div>
      </div>
    </div>
    <div class="footer">
      <span>T-1.4 · 预览</span>
      <span>灵犀演示 v0.1.0 · Phase 1 · T-1.0.b</span>
    </div>
  </div>
</body>
</html>
