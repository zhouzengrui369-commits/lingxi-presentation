name: LingxiDemo
options:
  bundleIdPrefix: com.openclaw.lingxi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: YES
targets:
  LingxiDemo:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        type: folder
    info:
      path: Info.plist
      properties:
        CFBundleName: 灵犀演示
        CFBundleDisplayName: 灵犀演示
        CFBundleIdentifier: com.openclaw.lingxi
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: LingxiDemo
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSAppleEventsUsageDescription: 灵犀演示 needs AppleEvents to control Finder for opening output files.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.lingxi
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon