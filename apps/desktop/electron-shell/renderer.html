<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' file:" />
  <title>灵犀演示</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; background: #f5f5f7; color: #1d1d1f; }
    .header { padding: 18px 24px; background: linear-gradient(135deg, #2d3a8c, #4a5fc1); color: #fff; }
    .header h1 { margin: 0 0 4px; font-size: 22px; }
    .header p { margin: 0; opacity: 0.85; font-size: 12px; }
    .container { display: flex; height: calc(100vh - 80px); }
    .sidebar { width: 260px; background: #fff; border-right: 1px solid #d2d2d7; padding: 20px; overflow-y: auto; }
    .sidebar h2 { margin: 0 0 14px; font-size: 13px; color: #6e6e73; }
    .step { display: flex; align-items: center; padding: 8px 0; font-size: 13px; }
    .step .dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #c7c7cc; margin-right: 10px; flex-shrink: 0; }
    .step.active .dot { border-color: #0071e3; background: radial-gradient(circle, #0071e3 40%, transparent 40%); }
    .step.done .dot { background: #34c759; border-color: #34c759; }
    .main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .metric { background: #fff; border-radius: 8px; padding: 12px; border: 1px solid #e5e5ea; }
    .metric .label { font-size: 11px; color: #6e6e73; }
    .metric .value { font-size: 18px; font-weight: 600; font-family: "SF Mono", monospace; margin-top: 4px; }
    .log-panel { flex: 1; background: #1d1d1f; color: #f5f5f7; border-radius: 8px; padding: 12px; overflow-y: auto; font-family: "SF Mono", monospace; font-size: 11px; line-height: 1.5; }
    .log-panel .line { white-space: pre-wrap; }
    .log-panel .err { color: #ff6b6b; }
    .log-panel .ok { color: #6bcf7f; }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    button { padding: 10px 18px; border-radius: 8px; border: none; background: #0071e3; color: #fff; font-size: 13px; cursor: pointer; }
    button:disabled { background: #c7c7cc; cursor: not-allowed; }
    button.secondary { background: #e5e5ea; color: #1d1d1f; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; background: #34c759; color: #fff; }
    .badge.fail { background: #ff3b30; }
  </style>
</head>
<body>
  <div class="header">
    <h1>灵犀演示 <span id="status" class="badge">就绪</span></h1>
    <p>AI 驱动的办公内容生成 · 季度汇报 demo · macOS 平台验证 (T-3.1)</p>
  </div>
  <div class="container">
    <div class="sidebar">
      <h2>演示流程</h2>
      <div class="step" data-step="0"><div class="dot"></div>探测 daemon</div>
      <div class="step" data-step="1"><div class="dot"></div>导入源文件</div>
      <div class="step" data-step="2"><div class="dot"></div>顾问 3 轮对话</div>
      <div class="step" data-step="3"><div class="dot"></div>选择模板</div>
      <div class="step" data-step="4"><div class="dot"></div>生成 HTML 预览</div>
      <div class="step" data-step="5"><div class="dot"></div>输出 4 格式</div>
      <div class="actions">
        <button id="runBtn" onclick="runDemo()">▶ 开始季度汇报</button>
        <button id="openOutBtn" class="secondary" onclick="openOutput()" disabled>打开输出</button>
      </div>
    </div>
    <div class="main">
      <div class="metrics">
        <div class="metric"><div class="label">源文件</div><div class="value" id="m-files">0</div></div>
        <div class="metric"><div class="label">Wiki 条目</div><div class="value" id="m-entries">0</div></div>
        <div class="metric"><div class="label">顾问轮次</div><div class="value" id="m-rounds">0</div></div>
        <div class="metric"><div class="label">输出格式</div><div class="value" id="m-formats">0/4</div></div>
      </div>
      <div class="log-panel" id="log"></div>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');
    const openOutBtn = document.getElementById('openOutBtn');
    let outputDir = null;

    function appendLog(line) {
      const trimmed = (line || '').trim();
      if (!trimmed) return;
      const div = document.createElement('div');
      div.className = 'line';
      if (trimmed.includes('FATAL') || trimmed.includes('ERROR')) div.classList.add('err');
      if (trimmed.includes('✓') || trimmed.includes('ok') || trimmed.includes('PASS')) div.classList.add('ok');
      div.textContent = trimmed;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStep(idx, state) {
      const step = document.querySelector(`[data-step="${idx}"]`);
      if (!step) return;
      step.classList.remove('active', 'done');
      if (state === 'active') step.classList.add('active');
      if (state === 'done') step.classList.add('done');
    }

    function resetSteps() {
      document.querySelectorAll('.step').forEach((s) => s.classList.remove('active', 'done'));
    }

    function detectStep(line) {
      if (line.includes('[0/5]')) setStep(0, 'active');
      else if (line.includes('[1/5]')) { setStep(0, 'done'); setStep(1, 'active'); }
      else if (line.includes('[2/5]')) { setStep(1, 'done'); setStep(2, 'active'); }
      else if (line.includes('[3/5]')) { setStep(2, 'done'); setStep(3, 'active'); }
      else if (line.includes('[4/5]')) { setStep(3, 'done'); setStep(4, 'active'); }
      else if (line.includes('[5/5]')) { setStep(4, 'done'); setStep(5, 'active'); }
    }

    function setMetric(id, value) { document.getElementById(id).textContent = value; }

    ipcRenderer.on('demo-log', (_, line) => {
      appendLog(line);
      detectStep(line);
      // Try to parse metrics
      const filesM = line.match(/导入文件: (\d+)/);
      if (filesM) setMetric('m-files', filesM[1]);
      const entriesM = line.match(/wiki 条目: (\d+)/);
      if (entriesM) setMetric('m-entries', entriesM[1]);
      const roundsM = line.match(/Round (\d+)/g);
      if (roundsM) setMetric('m-rounds', roundsM.length);
      const formatM = line.match(/\.(pptx|pdf|docx|html): status=ok size=(\d+)/g);
      if (formatM) {
        const formats = new Set(formatM.map((s) => s.match(/\.(\w+):/)[1]));
        setMetric('m-formats', `${formats.size}/4`);
      }
    });

    async function runDemo() {
      resetSteps();
      logEl.innerHTML = '';
      setMetric('m-files', 0); setMetric('m-entries', 0);
      setMetric('m-rounds', 0); setMetric('m-formats', '0/4');
      statusEl.textContent = '运行中';
      statusEl.className = 'badge';
      runBtn.disabled = true;
      openOutBtn.disabled = true;
      const result = await ipcRenderer.invoke('start-demo');
      runBtn.disabled = false;
      statusEl.textContent = result.ok ? '完成 ✓' : '失败';
      statusEl.className = 'badge' + (result.ok ? '' : ' fail');
      // Mark all done
      for (let i = 0; i < 6; i++) setStep(i, 'done');
      if (result.outputDir) {
        outputDir = result.outputDir;
        openOutBtn.disabled = false;
      }
    }

    function openOutput() {
      if (outputDir) ipcRenderer.invoke('show-in-finder', outputDir);
    }
  </script>
</body>
</html>
